<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>🚀 太空乘法任务 | 星际数学大冒险</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0"></script>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  min-height: 100vh;
  background: linear-gradient(135deg, #0a0f2a 0%, #0a1a3a 50%, #0a0f2a 100%);
  overflow-x: hidden;
  font-family: 'Comic Neue', 'Segoe UI', 'Comic Neue', 'Chalkboard SE', 'Comic Sans MS', cursive, sans-serif;
  position: relative;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

.stars {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 0;
}

.star {
  position: absolute;
  background: white;
  border-radius: 50%;
  animation: twinkle 3s infinite alternate;
}

@keyframes twinkle {
  0% { opacity: 0.2; transform: scale(1); }
  100% { opacity: 1; transform: scale(1.2); }
}

.planet {
  position: fixed;
  border-radius: 50%;
  filter: blur(3px);
  animation: float 20s infinite ease-in-out;
  z-index: 0;
  pointer-events: none;
}

@keyframes float {
  0%, 100% { transform: translateY(0px) rotate(0deg); }
  50% { transform: translateY(-20px) rotate(5deg); }
}

.rocket {
  position: fixed;
  bottom: 20px;
  left: -100px;
  font-size: 60px;
  animation: fly 15s infinite linear;
  z-index: 1;
  filter: drop-shadow(0 0 10px rgba(255,100,0,0.5));
  pointer-events: none;
}

@keyframes fly {
  0% { left: -100px; transform: rotate(-5deg); }
  100% { left: 120%; transform: rotate(5deg); }
}

.ufo {
  position: fixed;
  top: 15%;
  right: -80px;
  font-size: 50px;
  animation: ufoFly 18s infinite linear;
  z-index: 1;
  pointer-events: none;
}

@keyframes ufoFly {
  0% { right: -80px; transform: rotate(0deg); }
  100% { right: 120%; transform: rotate(360deg); }
}

.app-container {
  position: relative;
  z-index: 10;
  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(12px);
  border-radius: 80px;
  border: 3px solid rgba(255, 215, 100, 0.6);
  box-shadow: 0 20px 60px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.3);
  width: 100%;
  max-width: 1400px;
  padding: 40px 35px;
  transition: all 0.3s;
}

.nav-buttons {
  position: absolute;
  top: 25px;
  left: 30px;
  display: flex;
  gap: 12px;
  z-index: 20;
  flex-wrap: wrap;
}

.nav-btn, .teacher-btn {
  background: rgba(100, 150, 255, 0.3);
  border: 2px solid #88aaff;
  color: white;
  padding: 8px 20px;
  border-radius: 60px;
  cursor: pointer;
  font-size: 0.9rem;
  font-weight: bold;
  backdrop-filter: blur(5px);
  transition: all 0.3s;
  display: flex;
  align-items: center;
  gap: 5px;
}

.nav-btn:hover, .teacher-btn:hover {
  background: rgba(100, 150, 255, 0.6);
  transform: scale(1.05);
  border-color: #ffdd99;
}

.lang-switch {
  position: absolute;
  top: 25px;
  right: 30px;
  background: linear-gradient(135deg, #ffaa44, #ff8844);
  border: 2px solid #ffdd99;
  color: white;
  padding: 8px 20px;
  border-radius: 60px;
  cursor: pointer;
  font-size: 0.9rem;
  font-weight: bold;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  transition: all 0.3s;
  z-index: 20;
}

.lang-switch:hover {
  transform: scale(1.05) rotate(2deg);
  background: linear-gradient(135deg, #ffbb55, #ff9955);
}

.screen {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 35px;
  animation: bounceIn 0.5s ease-out;
}

.screen.active {
  display: flex;
}

@keyframes bounceIn {
  0% { opacity: 0; transform: scale(0.9) translateY(-30px); }
  70% { transform: scale(1.02); }
  100% { opacity: 1; transform: scale(1) translateY(0); }
}

.title {
  font-size: 52px;
  font-weight: 900;
  text-align: center;
  background: linear-gradient(135deg, #FFD966, #FFA559, #FF6B6B);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  text-shadow: 0 0 30px rgba(255,200,100,0.5);
  letter-spacing: 2px;
}

.subtitle {
  font-size: 1.5rem;
  color: #FFE5B4;
  text-align: center;
  background: rgba(0,0,0,0.3);
  padding: 10px 25px;
  border-radius: 60px;
  display: inline-block;
}

.form-group {
  width: 100%;
  max-width: 550px;
  display: flex;
  flex-direction: column;
  gap: 25px;
}

.form-item {
  display: flex;
  flex-direction: column;
  gap: 10px;
  background: rgba(255,255,200,0.1);
  padding: 15px 25px;
  border-radius: 60px;
  backdrop-filter: blur(5px);
}

.form-item label {
  font-size: 1.2rem;
  font-weight: bold;
  color: #FFE5B4;
}

.form-item input {
  padding: 14px 24px;
  border-radius: 60px;
  border: 2px solid #ffaa66;
  background: rgba(30, 40, 70, 0.8);
  color: white;
  font-size: 1.1rem;
  outline: none;
  transition: all 0.3s;
}

.form-item input:focus {
  border-color: #ffcc88;
  box-shadow: 0 0 20px rgba(255,200,100,0.5);
  transform: scale(1.02);
}

.start-btn, .level-btn, .submit-btn, .restart-btn, .back-btn, .export-btn {
  background: linear-gradient(135deg, #FFB347, #FF8C33);
  border: none;
  border-radius: 60px;
  padding: 16px 32px;
  font-size: 1.4rem;
  font-weight: bold;
  color: #221c0f;
  cursor: pointer;
  transition: all 0.3s;
  box-shadow: 0 8px 20px rgba(0,0,0,0.3);
}

.start-btn:hover, .level-btn:hover, .submit-btn:hover, .restart-btn:hover, .back-btn:hover, .export-btn:hover {
  transform: translateY(-5px) scale(1.02);
  box-shadow: 0 15px 30px rgba(255,140,0,0.5);
}

.back-btn {
  background: linear-gradient(135deg, #6688ff, #4466cc);
  color: white;
}

.export-btn {
  background: linear-gradient(135deg, #44aa66, #228844);
  color: white;
  padding: 12px 24px;
  font-size: 1rem;
}

.level-buttons {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
  gap: 25px;
  width: 100%;
  margin-top: 20px;
}

.level-btn {
  padding: 35px 20px;
  font-size: 2rem;
  background: linear-gradient(135deg, rgba(100,80,200,0.6), rgba(80,60,180,0.8));
  border: 3px solid #ffcc66;
  backdrop-filter: blur(5px);
}

.level-btn span {
  font-size: 0.9rem;
  display: block;
  margin-top: 10px;
  color: #FFE5B4;
}

.timer-container {
  width: 100%;
  position: relative;
  margin-bottom: 10px;
}

.timer-bar {
  width: 100%;
  height: 20px;
  background: rgba(0,0,0,0.4);
  border-radius: 20px;
  overflow: hidden;
  border: 1px solid #ffaa66;
}

.timer-progress {
  height: 100%;
  background: linear-gradient(90deg, #ffaa44, #ff6644);
  width: 100%;
  border-radius: 20px;
  box-shadow: 0 0 10px #ff8844;
}

.question {
  font-size: 6rem;
  font-weight: 900;
  background: linear-gradient(135deg, #FFE5B4, #FFB347);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  text-shadow: 0 0 30px rgba(255,200,100,0.5);
  letter-spacing: 10px;
  padding: 20px;
  animation: pulse 1s infinite;
}

@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.02); }
}

.options {
  display: flex;
  gap: 30px;
  flex-wrap: wrap;
  justify-content: center;
  width: 100%;
}

.option-btn {
  background: radial-gradient(circle at 30% 30%, #ffaa66, #ff8844);
  border: 4px solid #FFE5B4;
  border-radius: 60px;
  width: 140px;
  height: 140px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 3.5rem;
  font-weight: 800;
  color: white;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 10px 20px rgba(0,0,0,0.3);
}

.option-btn:hover {
  transform: scale(1.1) rotate(5deg);
  background: radial-gradient(circle at 30% 30%, #ffbb77, #ff9955);
  box-shadow: 0 15px 30px rgba(255,140,0,0.6);
}

.input-answer {
  background: rgba(30, 40, 70, 0.9);
  border: 3px solid #ffaa66;
  border-radius: 60px;
  width: 300px;
  height: 130px;
  font-size: 4rem;
  text-align: center;
  color: #FFE5B4;
  outline: none;
  font-weight: bold;
  transition: all 0.3s;
}

.input-answer:focus {
  border-color: #ffcc88;
  box-shadow: 0 0 30px rgba(255,200,100,0.5);
  transform: scale(1.05);
}

.button-group {
  display: flex;
  gap: 20px;
  justify-content: center;
  margin-top: 20px;
  flex-wrap: wrap;
}

.report-card, .teacher-card {
  background: rgba(20, 30, 55, 0.8);
  backdrop-filter: blur(15px);
  border-radius: 60px;
  padding: 35px;
  width: 100%;
  border: 2px solid #ffcc88;
  max-height: 800px;
  overflow-y: auto;
}

.report-row {
  display: flex;
  justify-content: space-between;
  padding: 15px 0;
  border-bottom: 2px solid rgba(255,200,100,0.3);
  font-size: 1.2rem;
  font-weight: 500;
}

.table-results {
  margin-top: 25px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  max-height: 280px;
  overflow-y: auto;
}

.table-item {
  display: flex;
  justify-content: space-between;
  font-size: 1.1rem;
  padding: 12px 20px;
  background: rgba(255,200,100,0.15);
  border-radius: 40px;
  transition: all 0.3s;
}

.table-item:hover {
  background: rgba(255,200,100,0.3);
  transform: translateX(5px);
}

.report-conclusion {
  font-size: 1.8rem;
  font-weight: 800;
  text-align: center;
  margin-top: 30px;
  color: #ffcc88;
  text-shadow: 0 0 15px #ffaa66;
}

.history-item {
  background: rgba(100,150,255,0.2);
  margin-top: 12px;
  padding: 15px;
  border-radius: 30px;
  transition: all 0.3s;
}

.history-item:hover {
  background: rgba(100,150,255,0.4);
  transform: translateX(8px);
}

.clear-history-btn {
  background: rgba(255,100,80,0.4);
  border: 1px solid #ff8866;
  padding: 10px 25px;
  border-radius: 40px;
  margin-top: 15px;
  cursor: pointer;
  font-size: 0.9rem;
  transition: all 0.3s;
}

.clear-history-btn:hover {
  background: rgba(255,100,80,0.7);
  transform: scale(1.05);
}

.filter-bar {
  display: flex;
  gap: 15px;
  margin-bottom: 20px;
  flex-wrap: wrap;
  justify-content: center;
}

.filter-bar select, .filter-bar input {
  padding: 10px 20px;
  border-radius: 40px;
  border: 2px solid #ffaa66;
  background: rgba(30, 40, 70, 0.8);
  color: white;
  font-size: 1rem;
  outline: none;
}

.class-list {
  max-height: 400px;
  overflow-y: auto;
}

.class-item {
  background: rgba(255,200,100,0.15);
  margin: 10px 0;
  padding: 15px;
  border-radius: 30px;
  cursor: pointer;
  transition: all 0.3s;
}

.class-item:hover {
  background: rgba(255,200,100,0.3);
  transform: translateX(5px);
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
  margin: 20px 0;
}

.stat-card {
  background: rgba(255,200,100,0.2);
  padding: 20px;
  border-radius: 40px;
  text-align: center;
}

.stat-number {
  font-size: 2rem;
  font-weight: bold;
  color: #ffcc88;
}

canvas {
  max-height: 300px;
  margin: 20px 0;
}

.loading {
  text-align: center;
  padding: 40px;
  color: #ffcc88;
  font-size: 1.2rem;
}

.multiplication-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 12px;
  margin-top: 15px;
  max-height: 400px;
  overflow-y: auto;
}

.multiplication-card {
  background: rgba(255,200,100,0.12);
  padding: 12px;
  border-radius: 20px;
  text-align: center;
  transition: all 0.3s;
}

.multiplication-card:hover {
  background: rgba(255,200,100,0.25);
  transform: translateY(-3px);
}

.multiplication-title {
  font-size: 1.2rem;
  font-weight: bold;
  margin-bottom: 8px;
}

.multiplication-stats {
  font-size: 0.85rem;
  color: #ddd;
}

.multiplication-percent {
  font-size: 1.3rem;
  font-weight: bold;
  margin-top: 5px;
}

.multiplication-level {
  font-size: 0.85rem;
  margin-top: 5px;
}

@media (max-width: 700px) {
  .app-container { padding: 30px 20px; }
  .title { font-size: 2rem; }

// ==================== 核心函数 ====================
function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function generateQuestionsByLevel(level) {
  let qList = [];
  stats = {};
  if (level === 1) {
    let base = [];
    for (let i = 0; i <= 12; i++) base.push({ a: 2, b: i, ans: 2 * i });
    let copy = shuffleArray([...base]);
    qList = [...base, ...copy];
    stats[2] = { total: qList.length, correct: 0 };
  } 
  else if (level === 2) {
    for (let m = 0; m <= 5; m++) {
      stats[m] = { total: 13, correct: 0 };
      for (let i = 0; i <= 12; i++) qList.push({ a: m, b: i, ans: m * i });
    }
    qList = shuffleArray(qList);
  }
  else if (level === 3) {
    let pool = [];
    stats[0] = { total: 2, correct: 0 }; pool.push({ a: 0, b: 4, ans: 0 }, { a: 0, b: 9, ans: 0 });
    stats[1] = { total: 2, correct: 0 }; pool.push({ a: 1, b: 5, ans: 5 }, { a: 1, b: 12, ans: 12 });
    for (let n = 2; n <= 9; n++) {
      stats[n] = { total: 13, correct: 0 };
      for (let i = 0; i <= 12; i++) pool.push({ a: n, b: i, ans: n * i });
    }
    qList = shuffleArray(pool);
  }
  else if (level === 4) {
    let pool = [];
    stats[0] = { total: 2, correct: 0 }; pool.push({ a: 0, b: 3, ans: 0 }, { a: 0, b: 8, ans: 0 });
    stats[1] = { total: 2, correct: 0 }; pool.push({ a: 1, b: 6, ans: 6 }, { a: 1, b: 11, ans: 11 });
    for (let n = 2; n <= 9; n++) {
      stats[n] = { total: 11, correct: 0 };
      for (let i = 2; i <= 12; i++) pool.push({ a: n, b: i, ans: n * i });
    }
    stats[10] = { total: 4, correct: 0 };
    let tenChoices = shuffleArray([...Array(13).keys()]).slice(0, 4);
    tenChoices.forEach(b => pool.push({ a: 10, b: b, ans: 10 * b }));
    stats[11] = { total: 4, correct: 0 };
    let elevenChoices = shuffleArray([...Array(13).keys()]).slice(0, 4);
    elevenChoices.forEach(b => pool.push({ a: 11, b: b, ans: 11 * b }));
    stats[12] = { total: 11, correct: 0 };
    for (let i = 2; i <= 12; i++) pool.push({ a: 12, b: i, ans: 12 * i });
    qList = shuffleArray(pool);
  }
  return qList;
}

function renderOptions(correctAns, countOpt) {
  const container = document.getElementById('optionsContainer');
  if (!container) return;
  container.innerHTML = '';
  let opts = [correctAns];
  while (opts.length < countOpt) {
    let offset = Math.floor(Math.random() * 21) - 10;
    let candidate = correctAns + offset;
    if (candidate >= 0 && candidate <= 300 && !opts.includes(candidate)) opts.push(candidate);
  }
  shuffleArray(opts);
  opts.forEach(val => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = val;
    btn.onclick = () => checkAnswer(val);
    container.appendChild(btn);
  });
}

function startTimerForQuestion() {
  stopTimer();
  
  let duration;
  if (currentLevel === 1) {
    duration = 20;
  } else if (currentLevel === 2) {
    duration = 20;
  } else {
    duration = 25;
  }
  
  const progressDiv = document.getElementById('timerProgress');
  if (!progressDiv) return;
  
  progressDiv.style.transition = 'none';
  progressDiv.style.width = '100%';
  void progressDiv.offsetWidth;
  progressDiv.style.transition = `width ${duration}s linear`;
  progressDiv.style.width = '0%';
  
  let timeLeft = duration;
  timerInterval = setInterval(() => {
    timeLeft--;
    if (timeLeft <= 0) {
      stopTimer();
      if (currentIndex < questions.length) {
        checkAnswer(null);
      }
    }
  }, 1000);
}

function showCurrentQuestion() {
  if (currentIndex >= questions.length) {
    saveAndShowReport();
    return;
  }
  const q = questions[currentIndex];
  document.getElementById('questionDisplay').textContent = `${q.a} × ${q.b} = ?`;
  const optDiv = document.getElementById('optionsContainer');
  const inputField = document.getElementById('answerInput');
  if (currentLevel === 1 || currentLevel === 2) {
    if (inputField) inputField.style.display = 'none';
    if (optDiv) optDiv.style.display = 'flex';
    const optCount = (currentLevel === 1) ? 4 : 5;
    renderOptions(q.ans, optCount);
  } else {
    if (optDiv) optDiv.style.display = 'none';
    if (inputField) {
      inputField.style.display = 'block';
      inputField.value = '';
      inputField.focus();
    }
  }
  startTimerForQuestion();
}

function checkAnswer(userAnswer) {
  stopTimer();
  if (currentIndex >= questions.length) return;
  const q = questions[currentIndex];
  const isCorrect = (userAnswer === q.ans);
  if (isCorrect) correctCount++;
  if (stats[q.a]) {
    stats[q.a].correct += isCorrect ? 1 : 0;
  }
  currentIndex++;
  setTimeout(() => {
    showCurrentQuestion();
  }, 280);
}

async function saveToSupabase() {
  if (!supabaseClient) {
    saveToLocalStorage();
    return;
  }
  const newRecord = {
    school: student.school,
    class: student.className,
    name: student.name,
    level: currentLevel,
    correct: correctCount,
    total: questions.length,
    accuracy: Math.round((correctCount / questions.length) * 100),
    details: stats,
    created_at: new Date().toISOString()
  };
  try {
    const { error } = await supabaseClient.from('math_records').insert([newRecord]);
    if (error) throw error;
    console.log('✅ 成绩已保存到云端');
  } catch(e) {
    console.log('云端保存失败，保存到本地:', e);
    saveToLocalStorage();
  }
}

function saveToLocalStorage() {
  const records = JSON.parse(localStorage.getItem('mathRecords') || '[]');
  records.unshift({
    ...student,
    level: currentLevel,
    correct: correctCount,
    total: questions.length,
    accuracy: Math.round((correctCount / questions.length) * 100),
    date: new Date().toISOString(),
    stats: stats
  });
  if (records.length > 50) records.pop();
  localStorage.setItem('mathRecords', JSON.stringify(records));
}

function getHistoryFromLocal() {
  const records = JSON.parse(localStorage.getItem('mathRecords') || '[]');
  return records.filter(r => r.name === student.name && r.school === student.school);
}

async function getHistoryRecords() {
  if (!supabaseClient) return getHistoryFromLocal();
  try {
    const { data, error } = await supabaseClient
      .from('math_records')
      .select('*')
      .eq('name', student.name)
      .eq('school', student.school)
      .order('created_at', { ascending: false });
    if (error) throw error;
    return data || [];
  } catch(e) {
    return getHistoryFromLocal();
  }
}

async function saveAndShowReport() {
  if (!gameStarted || questions.length === 0) return;
  await saveToSupabase();
  const history = await getHistoryRecords();
  const currentAccuracy = Math.round((correctCount / questions.length) * 100);
  let previousAccuracy = null;
  let previousRecord = null;
  if (history.length > 1) {
    const previousSameLevel = history.slice(1).find(h => h.level === currentLevel);
    if (previousSameLevel) {
      previousAccuracy = previousSameLevel.accuracy;
      previousRecord = previousSameLevel;
    }
  }
  document.getElementById('quizScreen').classList.remove('active');
  document.getElementById('reportScreen').classList.add('active');
  renderReport(history, currentAccuracy, previousAccuracy, previousRecord);
}

function renderReport(history = null, currentAccuracy = null, previousAccuracy = null, previousRecord = null) {
  const t = reportTexts[reportLang];
  const accuracy = currentAccuracy !== null ? currentAccuracy : Math.round((correctCount / questions.length) * 100);
  const nowDate = new Date().toLocaleString();
  let html = `
    <div class="report-row"><span>${t.school}</span><span>${student.school || '—'}</span></div>
    <div class="report-row"><span>${t.class}</span><span>${student.className || '—'}</span></div>
    <div class="report-row"><span>${t.name}</span><span>${student.name || '—'}</span></div>
    <div class="report-row"><span>${t.date}</span><span>${nowDate}</span></div>
    <div class="report-row"><span>${t.level}</span><span>Level ${currentLevel}</span></div>
    <div class="report-row"><span>${t.total}</span><span>${questions.length}</span></div>
    <div class="report-row"><span>${t.correct}</span><span>${correctCount}</span></div>
    <div class="report-row"><span>${t.accuracy}</span><span>${accuracy}%</span></div>`;
  if (previousAccuracy !== null && previousRecord) {
    const improvement = accuracy - previousAccuracy;
    const improvementText = improvement >= 0 ? `📈 +${improvement}%` : `📉 ${improvement}%`;
    const prevDate = new Date(previousRecord.created_at || previousRecord.date).toLocaleDateString();
    html += `<div class="report-row" style="background: rgba(255,200,100,0.2); border-radius: 20px; margin-top: 10px; padding: 12px;">
      <span>📅 ${prevDate}<br>${t.previous}</span>
      <span><strong>${previousAccuracy}%</strong></span>
      <span>${t.improvement}</span>
      <span><strong style="color: ${improvement >= 0 ? '#90ff90' : '#ff9090'}">${improvementText}</strong></span>
    </div>`;
  }
  html += `<div class="table-results"><div style="font-weight:bold; padding:0 12px;">📊 乘法表掌握情况</div>`;
  const sortedKeys = Object.keys(stats).sort((a,b)=> +a - +b);
  for (let mult of sortedKeys) {
    const item = stats[mult];
    const percent = item.total ? Math.round((item.correct / item.total)*100) : 0;
    let levelText = percent >= 85 ? t.mastered : (percent >= 60 ? t.basic : t.needs);
    html += `<div class="table-item"><span>${mult} ${t.timesTable}</span><span>${levelText} (${percent}%)</span></div>`;
  }
  if (history && history.length > 1) {
    html += `<div style="margin-top: 25px;"><div style="font-weight:bold; margin-bottom: 15px;">📜 ${t.history}</div>`;
    const lastFive = history.slice(0, 5);
    lastFive.forEach((record, idx) => {
      const date = new Date(record.created_at || record.date).toLocaleString();
      const isCurrent = idx === 0;
      const highlight = isCurrent ? 'style="background: rgba(255,200,100,0.3); border-left: 4px solid #ffb359;"' : '';
      html += `<div class="history-item" ${highlight}>
        ${date}<br>
        Level ${record.level}: ${record.correct}/${record.total} (${record.accuracy}%)
        ${isCurrent ? ' ✨ 本次测试 ✨' : ''}
      </div>`;
    });
    html += `<div style="text-align: center; margin-top: 15px;">
      <button class="clear-history-btn" id="clearHistoryBtn">🗑️ ${t.clearHistory}</button>
    </div>`;
    html += `</div>`;
  }
  let msg = accuracy >= 90 ? t.masterMsg : (accuracy >= 70 ? t.goodMsg : t.tryMsg);
  html += `</div><div class="report-conclusion">${msg}</div>`;
  document.getElementById('reportCard').innerHTML = html;
  const clearBtn = document.getElementById('clearHistoryBtn');
  if (clearBtn) clearBtn.onclick = clearHistory;
}

async function clearHistory() {
  const confirmMsg = currentLang === 'zh' ? '确定要清除所有历史记录吗？🚀' : 'Clear all history? 🚀';
  if (confirm(confirmMsg)) {
    if (supabaseClient) {
      try {
        await supabaseClient.from('math_records').delete().eq('name', student.name).eq('school', student.school);
        alert(currentLang === 'zh' ? '云端历史记录已清除 ✨' : 'Cloud history cleared ✨');
      } catch(e) {}

    const otherRecords = records.filter(r => r.name !== student.name || r.school !== student.school);
    localStorage.setItem('mathRecords', JSON.stringify(otherRecords));
    const history = await getHistoryRecords();
    const currentAccuracy = Math.round((correctCount / questions.length) * 100);
    renderReport(history, currentAccuracy);
  }
}

function calculateStudentMultiplicationStats(records) {
  const studentMap = new Map();
  
  records.forEach(record => {
    const key = `${record.school}|${record.class}|${record.name}`;
    if (!studentMap.has(key)) {
      studentMap.set(key, {
        school: record.school,
        class: record.class,
        name: record.name,
        latestDate: record.created_at,
        stats: {}
      });
    }
    
    const studentData = studentMap.get(key);
    if (new Date(record.created_at) > new Date(studentData.latestDate)) {
      studentData.latestDate = record.created_at;
    }
    
    if (record.details && typeof record.details === 'object') {
      Object.keys(record.details).forEach(mult => {
        const num = parseInt(mult);
        if (!isNaN(num) && num >= 0 && num <= 12) {
          if (!studentData.stats[num]) {
            studentData.stats[num] = { total: 0, correct: 0 };
          }
          studentData.stats[num].total += record.details[mult].total || 0;
          studentData.stats[num].correct += record.details[mult].correct || 0;
        }
      });
    }
  });
  
  return Array.from(studentMap.values());
}

    for (const student of studentData) {

      let totalPercent = 0;

        const stat = student.stats[i];
        let percent = '';
        if (stat && stat.total > 0) {
          percent = Math.round((stat.correct / stat.total) * 100) + '%';
          totalPercent += parseInt(percent);
          count++;
        } else {
          percent = '-';
        }
        row += `,"${percent}"`;
      }
      
      const avgPercent = count > 0 ? Math.round(totalPercent / count) + '%' : '-';
      row += `,${avgPercent}\n`;
      csv += row;
    }
    
    const blob = new Blob(["\uFEFF" + csv], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    const dateStr = new Date().toLocaleDateString().replace(/\//g, '-');
    const filename = currentLang === 'zh' ? 
      `学生乘法表详情_${dateStr}.csv` : 
      `Student_Multiplication_Details_${dateStr}.csv`;
    link.href = URL.createObjectURL(blob);
    link.download = filename;
    link.click();
    URL.revokeObjectURL(link.href);
    
    alert(t.exportStudentSuccess(studentData.length));
  });
}

function calculateMultiplicationStats(records) {
  const stats = {};
  for (let i = 0; i <= 12; i++) {
    stats[i] = { total: 0, correct: 0 };
  }
  
  records.forEach(record => {
    if (record.details && typeof record.details === 'object') {
      Object.keys(record.details).forEach(mult => {
        const num = parseInt(mult);
        if (!isNaN(num) && num >= 0 && num <= 12) {
          const detail = record.details[mult];
          stats[num].total += detail.total || 0;
          stats[num].correct += detail.correct || 0;
        }
      });
    }
  });
  
  return stats;
}

function renderMultiplicationDetails(stats) {
  const t = texts[currentLang];
  let html = `<div style="margin-top: 25px;"><div style="font-weight:bold; margin-bottom: 15px; font-size: 1.2rem;">📊 ${t.timesTableMastery}</div>`;
  html += '<div class="multiplication-grid">';
  
  for (let i = 0; i <= 12; i++) {
    const stat = stats[i];
    const percent = stat.total > 0 ? Math.round((stat.correct / stat.total) * 100) : 0;
    let level = '';
    let levelColor = '';
    let emoji = '';
    
    if (stat.total === 0) {
      level = currentLang === 'zh' ? '暂无数据' : 'No data';
      levelColor = '#888';
      emoji = '❓';
    } else if (percent >= 85) {
      level = currentLang === 'zh' ? '已掌握' : 'Mastered';
      levelColor = '#90ff90';
      emoji = '🚀';
    } else if (percent >= 60) {
      level = currentLang === 'zh' ? '基本掌握' : 'Good';
      levelColor = '#ffcc88';
      emoji = '✨';
    } else {
      level = currentLang === 'zh' ? '需加强' : 'Need Practice';
      levelColor = '#ff9090';
      emoji = '🌱';
    }
    
    const title = currentLang === 'zh' ? `${i} 的乘法表` : `${i} Times Table`;
    
    html += `
      <div class="multiplication-card">
        <div class="multiplication-title">${emoji} ${title}</div>
        <div class="multiplication-stats">${stat.correct} / ${stat.total}</div>
        <div class="multiplication-percent" style="color: ${levelColor};">${percent}%</div>
        <div class="multiplication-level" style="color: ${levelColor};">${level}</div>
      </div>
    `;
  }
  
  html += '</div></div>';
  return html;
}

async function loadTeacherData() {
  const t = texts[currentLang];
  if (!supabaseClient) {
    document.getElementById('teacherCard').innerHTML = `<div class="loading">⚠️ Supabase ${currentLang === 'zh' ? '未连接，请刷新页面重试' : 'not connected. Please refresh.'}</div>`;
    return;
  }
  document.getElementById('teacherCard').innerHTML = `<div class="loading">${t.loading}</div>`;
  try {
    const schoolFilter = document.getElementById('filterSchool').value;
    const classFilter = document.getElementById('filterClass').value;
    let query = supabaseClient.from('math_records').select('*').order('created_at', { ascending: false });
    if (schoolFilter) query = query.eq('school', schoolFilter);
    if (classFilter) query = query.eq('class', classFilter);
    const { data, error } = await query;
    if (error) throw error;
    renderTeacherDashboard(data || []);
  } catch(e) {
    document.getElementById('teacherCard').innerHTML = `<div class="loading">❌ ${currentLang === 'zh' ? '加载失败' : 'Load failed'}: ${e.message}</div>`;
  }
}

function renderTeacherDashboard(records) {
  const t = texts[currentLang];
  if (!records || records.length === 0) {
    document.getElementById('teacherCard').innerHTML = `<div class="loading">${t.noData}</div>`;
    return;
  }
  
  const totalTests = records.length;
  const avgAccuracy = Math.round(records.reduce((sum, r) => sum + r.accuracy, 0) / totalTests);
  const bestScore = Math.max(...records.map(r => r.accuracy));
  const studentCount = [...new Set(records.map(r => `${r.school}-${r.class}-${r.name}`))].length;
  
  const multiplicationStats = calculateMultiplicationStats(records);
  
  let html = `
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-number">${studentCount}</div><div>${t.totalStudents}</div></div>
      <div class="stat-card"><div class="stat-number">${totalTests}</div><div>${t.totalTests}</div></div>
      <div class="stat-card"><div class="stat-number">${avgAccuracy}%</div><div>${t.avgAccuracy}</div></div>
      <div class="stat-card"><div class="stat-number">${bestScore}%</div><div>${t.highestScore}</div></div>
    </div>
    <canvas id="trendChart" style="max-height: 300px;"></canvas>
    ${renderMultiplicationDetails(multiplicationStats)}
    <div style="margin-top: 25px;"><div style="font-weight:bold; margin-bottom: 15px;">${t.recentRecords}</div></div>
    <div class="class-list">`;
  
  records.slice(0, 20).forEach(record => {
    const date = new Date(record.created_at).toLocaleString();
    html += `<div class="class-item">
      <strong>${record.school} - ${record.class} - ${record.name}</strong><br>
      Level ${record.level} | ${record.correct}/${record.total} (${record.accuracy}%)<br>
      <span style="font-size: 0.8rem;">${date}</span>
    </div>`;
  });
  
  html += `</div>`;
  document.getElementById('teacherCard').innerHTML = html;
  
  const ctx = document.getElementById('trendChart');
  if (ctx && typeof Chart !== 'undefined') {
    if (chart) chart.destroy();
    const last10 = records.slice(0, 10).reverse();
    chart = new Chart(ctx.getContext('2d'), {
      type: 'line',
      data: {
        labels: last10.map((_, i) => `${t.totalTests} ${i+1}`),
        datasets: [{
          label: t.avgAccuracy,
          data: last10.map(r => r.accuracy),
          borderColor: '#ffaa66',
          backgroundColor: 'rgba(255,170,102,0.1)',
          tension: 0.3,
          fill: true
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: true,
        plugins: { legend: { labels: { color: 'white' } } }
      }
    });
  }
}

function exportToExcel() {
  const t = texts[currentLang];
  if (!supabaseClient) return alert(t.noDataToExport);
  supabaseClient.from('math_records').select('*').order('created_at', { ascending: false }).then(({ data }) => {
    if (!data || data.length === 0) return alert(t.noDataToExport);
    
    let csv = '';
    if (currentLang === 'zh') {
      csv = '学校,班级,姓名,等级,正确数,总题数,正确率,测试时间\n';
    } else {
      csv = 'School,Class,Name,Level,Correct,Total,Accuracy,Test Date\n';
    }
    
    data.forEach(r => {
      csv += `"${r.school}","${r.class}","${r.name}",${r.level},${r.correct},${r.total},${r.accuracy}%,"${new Date(r.created_at).toLocaleString()}"\n`;
    });
    const blob = new Blob(["\uFEFF" + csv], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    const dateStr = new Date().toLocaleDateString().replace(/\//g, '-');
    const filename = currentLang === 'zh' ? 
      `测试记录_${dateStr}.csv` : 
      `Test_Records_${dateStr}.csv`;
    link.href = URL.createObjectURL(blob);
    link.download = filename;
    link.click();
    URL.revokeObjectURL(link.href);
    alert(t.exportSuccess(data.length));
  });
}
