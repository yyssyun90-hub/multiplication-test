<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<title>🚀 太空乘法任务 | 星际数学大冒险</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  min-height: 100vh;
  background: linear-gradient(135deg, #0a0f2a 0%, #0a1a3a 50%, #0a0f2a 100%);
  overflow-x: hidden;
  font-family: 'Comic Neue', 'Segoe UI', 'Comic Neue', 'Chalkboard SE', 'Comic Sans MS', cursive, sans-serif;
  position: relative;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

/* 动态星空背景 */
.stars {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 0;
}

.star {
  position: absolute;
  background: white;
  border-radius: 50%;
  animation: twinkle 3s infinite alternate;
}

@keyframes twinkle {
  0% { opacity: 0.2; transform: scale(1); }
  100% { opacity: 1; transform: scale(1.2); }
}

/* 行星装饰 */
.planet {
  position: fixed;
  border-radius: 50%;
  filter: blur(3px);
  animation: float 20s infinite ease-in-out;
  z-index: 0;
  pointer-events: none;
}

@keyframes float {
  0%, 100% { transform: translateY(0px) rotate(0deg); }
  50% { transform: translateY(-20px) rotate(5deg); }
}

/* 火箭动画 */
.rocket {
  position: fixed;
  bottom: 20px;
  left: -100px;
  font-size: 60px;
  animation: fly 15s infinite linear;
  z-index: 1;
  filter: drop-shadow(0 0 10px rgba(255,100,0,0.5));
  pointer-events: none;
}

@keyframes fly {
  0% { left: -100px; transform: rotate(-5deg); }
  100% { left: 120%; transform: rotate(5deg); }
}

/* UFO动画 */
.ufo {
  position: fixed;
  top: 15%;
  right: -80px;
  font-size: 50px;
  animation: ufoFly 18s infinite linear;
  z-index: 1;
  pointer-events: none;
}

@keyframes ufoFly {
  0% { right: -80px; transform: rotate(0deg); }
  100% { right: 120%; transform: rotate(360deg); }
}

/* 主容器 */
.app-container {
  position: relative;
  z-index: 10;
  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(12px);
  border-radius: 80px;
  border: 3px solid rgba(255, 215, 100, 0.6);
  box-shadow: 0 20px 60px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.3);
  width: 100%;
  max-width: 1000px;
  padding: 40px 35px;
  transition: all 0.3s;
}

/* 导航按钮组 */
.nav-buttons {
  position: absolute;
  top: 25px;
  left: 30px;
  display: flex;
  gap: 12px;
  z-index: 20;
}

.nav-btn {
  background: rgba(100, 150, 255, 0.3);
  border: 2px solid #88aaff;
  color: white;
  padding: 8px 20px;
  border-radius: 60px;
  cursor: pointer;
  font-size: 0.9rem;
  font-weight: bold;
  backdrop-filter: blur(5px);
  transition: all 0.3s;
  display: flex;
  align-items: center;
  gap: 5px;
}

.nav-btn:hover {
  background: rgba(100, 150, 255, 0.6);
  transform: scale(1.05);
  border-color: #ffdd99;
}

/* 语言切换按钮 */
.lang-switch {
  position: absolute;
  top: 25px;
  right: 30px;
  background: linear-gradient(135deg, #ffaa44, #ff8844);
  border: 2px solid #ffdd99;
  color: white;
  padding: 8px 20px;
  border-radius: 60px;
  cursor: pointer;
  font-size: 0.9rem;
  font-weight: bold;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  transition: all 0.3s;
  z-index: 20;
}

.lang-switch:hover {
  transform: scale(1.05) rotate(2deg);
  background: linear-gradient(135deg, #ffbb55, #ff9955);
}

/* 屏幕切换 */
.screen {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 35px;
  animation: bounceIn 0.5s ease-out;
}

.screen.active {
  display: flex;
}

@keyframes bounceIn {
  0% { opacity: 0; transform: scale(0.9) translateY(-30px); }
  70% { transform: scale(1.02); }
  100% { opacity: 1; transform: scale(1) translateY(0); }
}

/* 标题 */
.title {
  font-size: 52px;
  font-weight: 900;
  text-align: center;
  background: linear-gradient(135deg, #FFD966, #FFA559, #FF6B6B);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  text-shadow: 0 0 30px rgba(255,200,100,0.5);
  letter-spacing: 2px;
}

.subtitle {
  font-size: 1.5rem;
  color: #FFE5B4;
  text-align: center;
  background: rgba(0,0,0,0.3);
  padding: 10px 25px;
  border-radius: 60px;
  display: inline-block;
}

/* 表单 */
.form-group {
  width: 100%;
  max-width: 550px;
  display: flex;
  flex-direction: column;
  gap: 25px;
}

.form-item {
  display: flex;
  flex-direction: column;
  gap: 10px;
  background: rgba(255,255,200,0.1);
  padding: 15px 25px;
  border-radius: 60px;
  backdrop-filter: blur(5px);
}

.form-item label {
  font-size: 1.2rem;
  font-weight: bold;
  color: #FFE5B4;
}

.form-item input {
  padding: 14px 24px;
  border-radius: 60px;
  border: 2px solid #ffaa66;
  background: rgba(30, 40, 70, 0.8);
  color: white;
  font-size: 1.1rem;
  outline: none;
  transition: all 0.3s;
}

.form-item input:focus {
  border-color: #ffcc88;
  box-shadow: 0 0 20px rgba(255,200,100,0.5);
  transform: scale(1.02);
}

/* 按钮通用样式 */
.start-btn, .level-btn, .submit-btn, .restart-btn, .back-btn {
  background: linear-gradient(135deg, #FFB347, #FF8C33);
  border: none;
  border-radius: 60px;
  padding: 16px 32px;
  font-size: 1.4rem;
  font-weight: bold;
  color: #221c0f;
  cursor: pointer;
  transition: all 0.3s;
  box-shadow: 0 8px 20px rgba(0,0,0,0.3);
}

.start-btn:hover, .level-btn:hover, .submit-btn:hover, .restart-btn:hover, .back-btn:hover {
  transform: translateY(-5px) scale(1.02);
  box-shadow: 0 15px 30px rgba(255,140,0,0.5);
}

.back-btn {

  color: white;
}

/* 等级按钮网格 */
.level-buttons {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
  gap: 25px;
  width: 100%;
  margin-top: 20px;
}

.level-btn {

  background: linear-gradient(135deg, rgba(100,80,200,0.6), rgba(80,60,180,0.8));
  border: 3px solid #ffcc66;

}

.level-btn span {
  font-size: 0.9rem;
  display: block;

  color: #FFE5B4;
}

/* 计时器 */
.timer-container {
  width: 100%;
  position: relative;
  margin-bottom: 10px;
}

.timer-bar {
  width: 100%;
  height: 20px;
  background: rgba(0,0,0,0.4);
  border-radius: 20px;
  overflow: hidden;
  border: 1px solid #ffaa66;
}

.timer-progress {
  height: 100%;
  background: linear-gradient(90deg, #ffaa44, #ff6644);
  width: 100%;
  border-radius: 20px;
  box-shadow: 0 0 10px #ff8844;
}

/* 题目 */
.question {

}

@keyframes pulse {

  gap: 30px;

}

.option-btn {

.option-btn:hover {

/* 输入框 */

.input-answer:focus {

/* 按钮组 */
.button-group {

  gap: 20px;
  justify-content: center;
  margin-top: 20px;
  flex-wrap: wrap;
}

/* 报告页面 */
.report-card {
  background: rgba(20, 30, 55, 0.8);

  border-radius: 60px;
  padding: 35px;
  width: 100%;
  border: 2px solid #ffcc88;
  max-height: 550px;

.report-row {
  display: flex;

  padding: 15px 0;

  font-size: 1.2rem;

}

.table-results {

  flex-direction: column;

  max-height: 280px;

}

.table-item {

  justify-content: space-between;

.table-item:hover {

.report-conclusion {

.history-item {

/* 响应式 */
@media (max-width: 700px) {
  .app-container { padding: 30px 20px; }
  .title { font-size: 2rem; }

  .option-btn { width: 90px; height: 90px; font-size: 2rem; }

  .button-group { flex-direction: column; gap: 12px; }
  .back-btn, .submit-btn { width: 100%; }
}

// ======================= 辅助函数 ======================
function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function generateQuestionsByLevel(level) {
  let qList = [];
  stats = {};
  if (level === 1) {
    let base = [];
    for (let i = 0; i <= 12; i++) base.push({ a: 2, b: i, ans: 2 * i });
    let copy = shuffleArray([...base]);
    qList = [...base, ...copy];
    stats[2] = { total: qList.length, correct: 0 };
  } 
  else if (level === 2) {
    for (let m = 0; m <= 5; m++) {
      stats[m] = { total: 13, correct: 0 };
      for (let i = 0; i <= 12; i++) qList.push({ a: m, b: i, ans: m * i });
    }
    qList = shuffleArray(qList);
  }
  else if (level === 3) {
    let pool = [];
    stats[0] = { total: 2, correct: 0 }; pool.push({ a: 0, b: 4, ans: 0 }, { a: 0, b: 9, ans: 0 });
    stats[1] = { total: 2, correct: 0 }; pool.push({ a: 1, b: 5, ans: 5 }, { a: 1, b: 12, ans: 12 });
    for (let n = 2; n <= 9; n++) {
      stats[n] = { total: 13, correct: 0 };
      for (let i = 0; i <= 12; i++) pool.push({ a: n, b: i, ans: n * i });
    }
    qList = shuffleArray(pool);
  }
  else if (level === 4) {
    let pool = [];
    stats[0] = { total: 2, correct: 0 }; pool.push({ a: 0, b: 3, ans: 0 }, { a: 0, b: 8, ans: 0 });
    stats[1] = { total: 2, correct: 0 }; pool.push({ a: 1, b: 6, ans: 6 }, { a: 1, b: 11, ans: 11 });
    for (let n = 2; n <= 9; n++) {
      stats[n] = { total: 11, correct: 0 };
      for (let i = 2; i <= 12; i++) pool.push({ a: n, b: i, ans: n * i });
    }
    stats[10] = { total: 4, correct: 0 };
    let tenChoices = shuffleArray([...Array(13).keys()]).slice(0, 4);
    tenChoices.forEach(b => pool.push({ a: 10, b: b, ans: 10 * b }));
    stats[11] = { total: 4, correct: 0 };
    let elevenChoices = shuffleArray([...Array(13).keys()]).slice(0, 4);
    elevenChoices.forEach(b => pool.push({ a: 11, b: b, ans: 11 * b }));
    stats[12] = { total: 11, correct: 0 };
    for (let i = 2; i <= 12; i++) pool.push({ a: 12, b: i, ans: 12 * i });
    qList = shuffleArray(pool);
  }
  return qList;
}

  if (document.getElementById('levelTitle')) document.getElementById('levelTitle').textContent = t.levelTitle;

// 停止计时器
function stopTimer() {
  if (timerInterval) {
    clearInterval(timerInterval);
    timerInterval = null;
  }
}

// 返回等级选择页面（修复版）
function goToLevelSelect() {
  stopTimer();
  gameStarted = false;
  stats = {};
  currentLevel = null;
  questions = [];
  currentIndex = 0;
  correctCount = 0;
  document.getElementById('quizScreen').classList.remove('active');
  document.getElementById('reportScreen').classList.remove('active');
  document.getElementById('levelScreen').classList.add('active');
}

// 返回信息填写页面（修复版）
function goToInfo() {
  stopTimer();
  gameStarted = false;
  stats = {};
  currentLevel = null;
  questions = [];
  currentIndex = 0;
  correctCount = 0;
  document.getElementById('levelScreen').classList.remove('active');
  document.getElementById('quizScreen').classList.remove('active');

// 返回首页（修复版）
function goToHome() {
  stopTimer();
  gameStarted = false;
  currentLevel = null;
  questions = [];
  currentIndex = 0;
  correctCount = 0;
  stats = {};
  
  // 清空输入框
  if (document.getElementById('school')) document.getElementById('school').value = '';
  if (document.getElementById('className')) document.getElementById('className').value = '';
  if (document.getElementById('studentName')) document.getElementById('studentName').value = '';
  
  document.getElementById('infoScreen').classList.add('active');
  document.getElementById('levelScreen').classList.remove('active');
  document.getElementById('quizScreen').classList.remove('active');

function renderOptions(correctAns, countOpt) {
  const container = document.getElementById('optionsContainer');
  if (!container) return;
  container.innerHTML = '';
  let opts = [correctAns];
  while (opts.length < countOpt) {
    let offset = Math.floor(Math.random() * 21) - 10;
    let candidate = correctAns + offset;
    if (candidate >= 0 && candidate <= 300 && !opts.includes(candidate)) opts.push(candidate);
  }
  shuffleArray(opts);
  opts.forEach(val => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = val;
    btn.onclick = () => checkAnswer(val);
    container.appendChild(btn);
  });
}

function startTimerForQuestion() {
  stopTimer();
  const duration = (currentLevel === 1 || currentLevel === 2) ? 15 : 10;
  const progressDiv = document.getElementById('timerProgress');
  if (!progressDiv) return;
  
  progressDiv.style.transition = 'none';
  progressDiv.style.width = '100%';
  void progressDiv.offsetWidth;
  progressDiv.style.transition = `width ${duration}s linear`;
  progressDiv.style.width = '0%';
  
  let timeLeft = duration;
  timerInterval = setInterval(() => {
    timeLeft--;
    if (timeLeft <= 0) {
      stopTimer();
      if (currentIndex < questions.length) {
        checkAnswer(null);
      }
    }
  }, 1000);
}

function showCurrentQuestion() {
  if (currentIndex >= questions.length) {
    saveAndShowReport();
    return;
  }
  const q = questions[currentIndex];
  document.getElementById('questionDisplay').textContent = `${q.a} × ${q.b} = ?`;
  const optDiv = document.getElementById('optionsContainer');
  const inputField = document.getElementById('answerInput');
  if (currentLevel === 1 || currentLevel === 2) {
    if (inputField) inputField.style.display = 'none';
    if (optDiv) optDiv.style.display = 'flex';
    const optCount = (currentLevel === 1) ? 4 : 5;
    renderOptions(q.ans, optCount);
  } else {
    if (optDiv) optDiv.style.display = 'none';
    if (inputField) {
      inputField.style.display = 'block';
      inputField.value = '';
      inputField.focus();
    }
  }
  startTimerForQuestion();
}

function checkAnswer(userAnswer) {
  stopTimer();
  if (currentIndex >= questions.length) return;
  const q = questions[currentIndex];
  const isCorrect = (userAnswer === q.ans);
  if (isCorrect) correctCount++;
  if (stats[q.a]) {
    stats[q.a].correct += isCorrect ? 1 : 0;
  }
  currentIndex++;
  setTimeout(() => {
    showCurrentQuestion();
  }, 280);
}

function saveToLocalStorage() {
  const records = JSON.parse(localStorage.getItem('mathRecords') || '[]');
  const newRecord = {
    school: student.school,
    class: student.className,
    name: student.name,
    level: currentLevel,
    correct: correctCount,
    total: questions.length,
    accuracy: Math.round((correctCount / questions.length) * 100),
    date: new Date().toISOString(),
    dateDisplay: new Date().toLocaleString(),
    stats: stats
  };
  records.unshift(newRecord);
  if (records.length > 50) records.pop();
  localStorage.setItem('mathRecords', JSON.stringify(records));
}

function getHistoryRecords() {
  const records = JSON.parse(localStorage.getItem('mathRecords') || '[]');
  return records.filter(r => r.name === student.name && r.school === student.school);
}

function clearHistory() {
  if (confirm(currentLang === 'zh' ? '确定要清除所有历史记录吗？🚀' : 'Clear all history? 🚀')) {
    const records = JSON.parse(localStorage.getItem('mathRecords') || '[]');
    const otherRecords = records.filter(r => r.name !== student.name || r.school !== student.school);
    localStorage.setItem('mathRecords', JSON.stringify(otherRecords));
    if (document.getElementById('reportScreen').classList.contains('active') && gameStarted) {
      const history = getHistoryRecords();
      const currentAccuracy = questions.length > 0 ? Math.round((correctCount / questions.length) * 100) : 0;
      renderReport(history, currentAccuracy);
    }
    alert(currentLang === 'zh' ? '历史记录已清除 ✨' : 'History cleared ✨');
  }
}

function saveAndShowReport() {
  if (!gameStarted || questions.length === 0) return;
  saveToLocalStorage();
  const history = getHistoryRecords();
  const currentAccuracy = Math.round((correctCount / questions.length) * 100);
  let previousAccuracy = null;
  let previousRecord = null;
  
  if (history.length > 1) {
    const previousSameLevel = history.slice(1).find(h => h.level === currentLevel);
    if (previousSameLevel) {
      previousAccuracy = previousSameLevel.accuracy;
      previousRecord = previousSameLevel;
    }
  }
  
  document.getElementById('quizScreen').classList.remove('active');
  document.getElementById('reportScreen').classList.add('active');
  renderReport(history, currentAccuracy, previousAccuracy, previousRecord);
}

function renderReport(history = null, currentAccuracy = null, previousAccuracy = null, previousRecord = null) {
  const t = reportTexts[reportLang];
  const totalQ = questions.length || 1;
  const accuracy = currentAccuracy !== null ? currentAccuracy : (questions.length > 0 ? Math.round((correctCount / totalQ) * 100) : 0);
  const nowDate = new Date().toLocaleString();
  
  let html = `
    <div class="report-row"><span>${t.school}</span><span>${student.school || '—'}</span></div>
    <div class="report-row"><span>${t.class}</span><span>${student.className || '—'}</span></div>
    <div class="report-row"><span>${t.name}</span><span>${student.name || '—'}</span></div>
    <div class="report-row"><span>${t.date}</span><span>${nowDate}</span></div>
    <div class="report-row"><span>${t.level}</span><span>Level ${currentLevel}</span></div>
    <div class="report-row"><span>${t.total}</span><span>${questions.length}</span></div>
    <div class="report-row"><span>${t.correct}</span><span>${correctCount}</span></div>
    <div class="report-row"><span>${t.accuracy}</span><span>${accuracy}%</span></div>`;
  
  if (previousAccuracy !== null && previousRecord) {
    const improvement = accuracy - previousAccuracy;
    const improvementText = improvement >= 0 ? `📈 +${improvement}%` : `📉 ${improvement}%`;
    const prevDate = new Date(previousRecord.date).toLocaleDateString();
    html += `<div class="report-row" style="background: rgba(255,200,100,0.2); border-radius: 20px; margin-top: 10px; padding: 12px;">
      <span>📅 ${prevDate}<br>${t.previous}</span>
      <span><strong>${previousAccuracy}%</strong></span>
      <span>${t.improvement}</span>
      <span><strong style="color: ${improvement >= 0 ? '#90ff90' : '#ff9090'}">${improvementText}</strong></span>
    </div>`;
  }
  
  html += `<div class="table-results"><div style="font-weight:bold; padding:0 12px;">📊 乘法表掌握情况</div>`;
  
  const sortedKeys = Object.keys(stats).sort((a,b)=> +a - +b);
  if (sortedKeys.length === 0) {
    html += `<div class="table-item">暂无数据</div>`;
  } else {
    for (let mult of sortedKeys) {
      const item = stats[mult];
      const percent = item.total ? Math.round((item.correct / item.total)*100) : 0;
      let levelText = percent >= 85 ? t.mastered : (percent >= 60 ? t.basic : t.needs);
      html += `<div class="table-item"><span>${mult} ${t.timesTable}</span><span>${levelText} (${percent}%)</span></div>`;
    }
  }
  
  if (history && history.length > 1) {
    html += `<div style="margin-top: 25px;"><div style="font-weight:bold; margin-bottom: 15px;">📜 ${t.history}</div>`;
    const lastFive = history.slice(0, 5);
    lastFive.forEach((record, idx) => {
      const date = new Date(record.date).toLocaleString();
      const isCurrent = idx === 0;
      const highlight = isCurrent ? 'style="background: rgba(255,200,100,0.3); border-left: 4px solid #ffb359;"' : '';
      html += `<div class="history-item" ${highlight}>
        ${date}<br>
        Level ${record.level}: ${record.correct}/${record.total} (${record.accuracy}%)
        ${isCurrent ? ' ✨ 本次测试 ✨' : ''}
      </div>`;
    });
    
    html += `<div style="text-align: center; margin-top: 15px;">
      <button class="clear-history-btn" id="clearHistoryBtn">🗑️ ${t.clearHistory}</button>
    </div>`;
    html += `</div>`;
  }
  
  let msg = accuracy >= 90 ? t.masterMsg : (accuracy >= 70 ? t.goodMsg : t.tryMsg);
  html += `</div><div class="report-conclusion">${msg}</div>`;
  const reportCard = document.getElementById('reportCard');
  if (reportCard) reportCard.innerHTML = html;
  
  const clearBtn = document.getElementById('clearHistoryBtn');
  if (clearBtn) clearBtn.onclick = clearHistory;
}

  currentLang = currentLang === 'zh' ? 'en' : 'zh';
  applyUILang();
});

document.getElementById('homeBtn').addEventListener('click', () => {
  if (confirm(currentLang === 'zh' ? '确定要返回首页吗？当前进度将丢失。' : 'Return to home? Current progress will be lost.')) {
    goToHome();
  }
});

document.getElementById('backToInfoBtn').addEventListener('click', () => {
  goToInfo();
});

document.getElementById('backToLevelBtn').addEventListener('click', () => {
  if (confirm(currentLang === 'zh' ? '返回选等级？当前测试进度将丢失。' : 'Return to level select? Current progress will be lost.')) {
    goToLevelSelect();
  }
});

document.getElementById('backToLevelFromReportBtn').addEventListener('click', () => {
  goToLevelSelect();
});

document.getElementById('startBtn').onclick = () => {
  student.school = document.getElementById('school').value.trim();
  student.className = document.getElementById('className').value.trim();
  student.name = document.getElementById('studentName').value.trim();
  if (!student.school || !student.className || !student.name) {
    alert(currentLang === 'zh' ? '请完整填写宇航员资料 🚀' : 'Please fill in astronaut info 🚀');
    return;
  }
  document.getElementById('infoScreen').classList.remove('active');
  document.getElementById('levelScreen').classList.add('active');
};

document.querySelectorAll('.level-btn').forEach(btn => {
  btn.onclick = () => {
    currentLevel = parseInt(btn.dataset.lvl);
    questions = generateQuestionsByLevel(currentLevel);
    currentIndex = 0;
    correctCount = 0;
    gameStarted = true;
    document.getElementById('levelScreen').classList.remove('active');
    document.getElementById('quizScreen').classList.add('active');
    showCurrentQuestion();
  };
});

document.getElementById('submitBtn').onclick = () => {
  if ((currentLevel === 3 || currentLevel === 4) && gameStarted) {
    const inputVal = parseInt(document.getElementById('answerInput').value);
    if (isNaN(inputVal)) return;
    checkAnswer(inputVal);
  }
};

document.getElementById('restartBtn').onclick = () => {
  if (gameStarted && currentLevel) {
    questions = generateQuestionsByLevel(currentLevel);
    currentIndex = 0;
    correctCount = 0;
    stats = {};
    document.getElementById('reportScreen').classList.remove('active');
    document.getElementById('quizScreen').classList.add('active');
    showCurrentQuestion();
  }
};

document.querySelectorAll('.report-btn').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.report-btn').forEach(b => b.style.background = 'rgba(255,170,85,0.3)');
    btn.style.background = '#ffaa55';
    reportLang = btn.dataset.lang;
    if (document.getElementById('reportScreen').classList.contains('active') && gameStarted && questions.length > 0) {
      const history = getHistoryRecords();
      const currentAccuracy = Math.round((correctCount / questions.length) * 100);
      renderReport(history, currentAccuracy);
    }
  };
});

function createStars() {
  const starsContainer = document.getElementById('stars');
  if (!starsContainer) return;
  for (let i = 0; i < 200; i++) {
    let star = document.createElement('div');
    star.classList.add('star');
    let size = Math.random() * 3 + 1;
    star.style.width = size + 'px';
    star.style.height = size + 'px';
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 100 + '%';
    star.style.animationDelay = Math.random() * 3 + 's';
    star.style.animationDuration = 2 + Math.random() * 4 + 's';
    starsContainer.appendChild(star);
  }
}
createStars();
applyUILang();
